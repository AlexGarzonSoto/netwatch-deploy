global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: netwatch

# Cargar reglas de alerta
rule_files:
  - "alert-rules.yml"

scrape_configs:

  - job_name: netwatch-api-gateway
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: /actuator/prometheus

  - job_name: netwatch-worker-analysis
    static_configs:
      - targets: ['worker-analysis:8081']
    metrics_path: /actuator/prometheus

  - job_name: netwatch-worker-capture
    static_configs:
      - targets: ['localhost:8082']   # network_mode: host
    metrics_path: /actuator/prometheus

  - job_name: netwatch-worker-alerts
    static_configs:
      - targets: ['worker-alerts:8083']
    metrics_path: /actuator/prometheus

  - job_name: netwatch-worker-osint
    static_configs:
      - targets: ['worker-osint:8084']
    metrics_path: /actuator/prometheus

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
